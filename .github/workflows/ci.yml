name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (SQLite, in-memory)
        run: pytest -q

  # Optionaler Lauf gegen Postgres. Bis Phase 5 abgeschlossen ist bleibt
  # ``continue-on-error: true`` aktiv, damit ein roter Postgres-Job die
  # Haupt-CI nicht blockiert. Der Job wird nur auf Branches ausgefuehrt,
  # deren Name mit ``postgres/`` beginnt, oder manuell per workflow_dispatch.
  test-postgres:
    runs-on: ubuntu-latest
    needs: test
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/heads/postgres/') ||
      startsWith(github.head_ref, 'postgres/')
    continue-on-error: true

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bis
          POSTGRES_PASSWORD: bis
          POSTGRES_DB: bis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (inkl. psycopg)
        run: |
          pip install -r requirements.txt
          pip install "psycopg[binary]>=3.1"

      - name: Run tests (Postgres)
        env:
          # Die Tests nutzen weiterhin die in-memory SQLite-Fixture aus
          # conftest.py; dieser Job prueft zusaetzlich, dass die
          # Alembic-Migration gegen einen echten Postgres-Server durchlaeuft.
          DATABASE_URL: postgresql+psycopg://bis:bis@localhost:5432/bis_test
        run: |
          python -m alembic upgrade head
          pytest -q

  security-audit:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --strict
