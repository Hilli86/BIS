{% extends "layout/base.html" %}

{% block content %}
{# Beleuchtung: Styles nur im per <object> geladenen SVG (injectBeleuchtungLampStyles), nicht hier. #}
<div class="container-fluid">
  <div class="bis-toolbar justify-between mb-4">
    <h1 class="mb-0 bis-toolbar-title">Übersichten</h1>
  </div>

  <div class="card shadow-sm">
    <div class="card-header bg-secondary text-white d-flex align-items-center justify-content-between gap-2 py-3">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-diagram-3 fs-5"></i>
        <h2 class="h5 mb-0">Technik-Layouts</h2>
      </div>
      {% if current_diagram.id == 'beleuchtung' %}
      <small id="beleuchtung-sse-hinweis" class="small text-white-50 mb-0" aria-live="polite">Echtzeit: Initialisierung…</small>
      {% endif %}
    </div>
    <div class="card-body">
      {% if current_diagram.id == 'beleuchtung' and beleuchtung_redis_configured is false %}
      <div class="alert alert-warning small py-2" role="status">
        Kein Redis für Echtzeit-Daten. Bitte <code class="small">BIS_REDIS_URL</code> bzw. Redis in den <a href="{{ url_for('admin.mqtt_konfiguration') }}">MQTT-Einstellungen</a> hinterlegen.
      </div>
      {% endif %}

      <label for="technik-diagram-select" class="form-label d-md-none mb-1">Layout wählen</label>
      <select id="technik-diagram-select" class="form-select d-md-none mb-3" aria-label="Layout wählen">
        {% for d in diagramme %}
        <option value="{{ d.id }}"{% if d.id == current_diagram.id %} selected{% endif %}>{{ d.title }}</option>
        {% endfor %}
      </select>

      <div class="row g-3">
        <div class="col-md-4 col-lg-3 d-none d-md-flex flex-column">
          <input type="search" id="technik-diagram-filter" class="form-control form-control-sm mb-2" placeholder="Filter…" autocomplete="off" aria-label="Layout filtern">
          <div class="list-group list-group-flush border rounded overflow-auto flex-grow-1" id="technik-diagram-list" style="max-height: 70vh;">
            {% for d in diagramme %}
            <a href="{{ url_for('technik.uebersichten', diagram=d.id) }}"
               class="list-group-item list-group-item-action{% if d.id == current_diagram.id %} active{% endif %}"
               data-title="{{ d.title|lower }}">{{ d.title }}</a>
            {% endfor %}
          </div>
        </div>
        <div class="col-md-8 col-lg-9">
          <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-2">
            <strong class="text-body">{{ current_diagram.title }}</strong>
            <a href="{{ current_svg_url }}" class="btn btn-sm btn-outline-secondary" target="_blank" rel="noopener noreferrer">SVG in neuem Tab</a>
          </div>
          <div class="border rounded overflow-auto bg-transparent" style="min-height: 320px;">
            <object id="technik-svg-object"
                    type="image/svg+xml"
                    data="{{ current_svg_url }}"
                    class="w-100 d-block bg-transparent"
                    style="min-height: 480px; background: transparent;"
                    title="{{ current_diagram.title }}">
              <p class="p-3 mb-0">Ihr Browser kann das SVG nicht einbetten.
                <a href="{{ current_svg_url }}">Datei direkt öffnen</a></p>
            </object>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="technikLayoutHotspotModal" tabindex="-1" aria-labelledby="technikLayoutHotspotModalTitel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h5 class="modal-title" id="technikLayoutHotspotModalTitel">Detail</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
      </div>
      <div class="modal-body" id="technikLayoutHotspotModalBody" aria-live="polite">
        <dl class="row small mb-0" id="technikLayoutHotspotModalDl"></dl>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  var sel = document.getElementById('technik-diagram-select');
  if (sel) {
    sel.addEventListener('change', function () {
      var u = new URL(window.location.href);
      u.searchParams.set('diagram', this.value);
      window.location.href = u.toString();
    });
  }
  var filter = document.getElementById('technik-diagram-filter');
  var list = document.getElementById('technik-diagram-list');
  if (filter && list) {
    filter.addEventListener('input', function () {
      var q = (this.value || '').toLowerCase().trim();
      list.querySelectorAll('a[data-title]').forEach(function (a) {
        var t = a.getAttribute('data-title') || '';
        a.style.display = !q || t.indexOf(q) !== -1 ? '' : 'none';
      });
    });
  }

  /* SVG-Root im eingebetteten Dokument: kein opaker Flächenhintergrund (Zeichenfläche bleibt in den .svg-Dateien). */
  (function () {
    var obj = document.getElementById('technik-svg-object');
    if (!obj) return;
    function clearRootBg() {
      try {
        var doc = obj.contentDocument;
        if (!doc) return;
        var svg = doc.querySelector('svg');
        if (svg) svg.style.backgroundColor = 'transparent';
      } catch (e) { /* cross-origin */ }
    }
    if (obj.contentDocument && obj.contentDocument.querySelector('svg')) clearRootBg();
    else obj.addEventListener('load', clearRootBg);
  })();

  // Klickflächen: pro Eintrag in LAYOUT_HOTSPOTS (siehe routes); Felder/Modal aus LAYOUT_CONFIG.
  (function () {
    var LAYOUT_HOTSPOTS = {{ layout_hotspots|tojson }};
    var LAYOUT_CONFIG = {{ layout_hotspot_config|tojson }};
    if (!LAYOUT_HOTSPOTS || !LAYOUT_HOTSPOTS.length) return;
    if (!LAYOUT_CONFIG || !LAYOUT_CONFIG.felder || !LAYOUT_CONFIG.felder.length) return;
    var obj = document.getElementById('technik-svg-object');
    if (!obj) return;

    function tornummerFromId(id) {
      if (!id) return '';
      var s = String(id);
      if (/^SLT/i.test(s)) return s.replace(/^SLT/i, '');
      return s;
    }
    function wertFuerFeld(f, h) {
      if (f.format === 'strip_slt' && f.key === 'id') return tornummerFromId(h.id);
      var v = h[f.key];
      if (v === null || v === undefined) return '';
      return String(v);
    }
    function showHotspotModal(h) {
      if (!h || !h.id) return;
      var titel = document.getElementById('technikLayoutHotspotModalTitel');
      if (titel) titel.textContent = LAYOUT_CONFIG.modal_titel || 'Detail';
      var dl = document.getElementById('technikLayoutHotspotModalDl');
      if (dl) {
        while (dl.firstChild) dl.removeChild(dl.firstChild);
        LAYOUT_CONFIG.felder.forEach(function (f) {
          if (!f || !f.key) return;
          var dt = document.createElement('dt');
          dt.className = 'col-sm-4 text-muted';
          dt.textContent = f.label || f.key;
          var dd = document.createElement('dd');
          dd.className = f.key === 'id' || f.format === 'strip_slt' ? 'col-sm-8 font-monospace' : 'col-sm-8';
          var raw = wertFuerFeld(f, h);
          dd.textContent = raw === '' ? '—' : raw;
          dl.appendChild(dt);
          dl.appendChild(dd);
        });
      }
      var modalEl = document.getElementById('technikLayoutHotspotModal');
      if (modalEl && window.bootstrap) {
        window.bootstrap.Modal.getOrCreateInstance(modalEl).show();
      }
    }
    function cellIdCandidates(cellId) {
      var raw = String(cellId || '').trim();
      if (!raw) return [];
      var out = [];
      function add(x) { if (x && out.indexOf(x) < 0) out.push(x); }
      add(raw);
      add(raw.toUpperCase());
      var m = raw.toUpperCase().match(/^(SLT|PG|HS|SR|BL)0*(\d+)$/);
      if (m) {
        add(m[1] + m[2]);
        var padded = m[2].padStart(2, '0');
        add(m[1] + padded);
      }
      return out;
    }
    function findGByDataCellId(svg, cellId) {
      var cands = cellIdCandidates(cellId);
      var n = null;
      svg.querySelectorAll('g[data-cell-id]').forEach(function (node) {
        if (n) return;
        var v = (node.getAttribute('data-cell-id') || '').trim();
        if (cands.indexOf(v) >= 0 || cands.indexOf(v.toUpperCase()) >= 0) n = node;
      });
      return n;
    }
    function bindSvg(svgDoc) {
      var svg = svgDoc && svgDoc.querySelector && svgDoc.querySelector('svg');
      if (!svg) return;
      LAYOUT_HOTSPOTS.forEach(function (h) {
        if (!h || !h.id) return;
        var g = findGByDataCellId(svg, h.id);
        if (!g) {
          if (window.console && console.warn) {
            console.warn('Technik-Layout: Kein Hotspot-Element f\u00fcr data-cell-id="', h.id, '" im SVG');
          }
          return;
        }
        g.style.cursor = 'pointer';
        g.addEventListener('click', function (ev) {
          ev.preventDefault();
          ev.stopPropagation();
          showHotspotModal(h);
        });
      });
    }
    if (obj.contentDocument && obj.contentDocument.querySelector('svg')) {
      bindSvg(obj.contentDocument);
    } else {
      obj.addEventListener('load', function onLoad() {
        obj.removeEventListener('load', onLoad);
        try {
          if (obj.contentDocument) bindSvg(obj.contentDocument);
        } catch (e) { /* cross-origin: kein Zugriff */ }
      });
    }
  })();

  {% if current_diagram.id == 'beleuchtung' %}
  (function () {
    var streamUrl = {{ url_for('technik.beleuchtung_stream')|tojson }};
    var init = {{ (beleuchtung_initial or {})|tojson }};
    var statusEl = document.getElementById('beleuchtung-sse-hinweis');
    var obj = document.getElementById('technik-svg-object');
    if (!obj) return;
    var dbg = new URLSearchParams(window.location.search).get('beleuchtung_debug') === '1';
    var lastStates = (init && init.states) ? init.states : {};
    var BIS_BELEUCHTUNG_LAMP_CSS = [
      '.bis-lampe-unk{opacity:0.6;}',
      '.bis-lampe-an ellipse,.bis-lampe-an circle{fill:#198754!important;stroke:#000!important;}',
      '.bis-lampe-an path[fill="none"],.bis-lampe-an line[fill="none"],.bis-lampe-an polyline[fill="none"],.bis-lampe-an polygon[fill="none"]{stroke:#000!important;}',
      '.bis-lampe-an rect[fill]:not([fill="none"]):not([fill^="url"]){fill:#198754!important;}',
      '.bis-lampe-aus ellipse,.bis-lampe-aus circle{fill:#fff!important;stroke:#212529!important;}',
      '.bis-lampe-aus path[fill="none"],.bis-lampe-aus line[fill="none"],.bis-lampe-aus polyline[fill="none"],.bis-lampe-aus polygon[fill="none"]{stroke:#212529!important;}',
      '.bis-lampe-aus rect[fill]:not([fill="none"]):not([fill^="url"]){fill:#fff!important;stroke:#212529!important;}'
    ].join('');

    function injectBeleuchtungLampStyles(svgDoc) {
      if (!svgDoc) return;
      var root = svgDoc.querySelector('svg');
      if (!root) return;
      var st = svgDoc.getElementById('bis-beleuchtung-lamp-css');
      if (st) {
        st.textContent = BIS_BELEUCHTUNG_LAMP_CSS;
        return;
      }
      st = svgDoc.createElementNS('http://www.w3.org/2000/svg', 'style');
      st.setAttribute('id', 'bis-beleuchtung-lamp-css');
      st.setAttribute('type', 'text/css');
      st.textContent = BIS_BELEUCHTUNG_LAMP_CSS;
      root.insertBefore(st, root.firstChild);
    }

    function setStatus(text, ok) {
      if (!statusEl) return;
      statusEl.textContent = text;
      statusEl.className = 'small mb-0 ' + (ok ? 'text-success' : 'text-warning');
    }

    function stateToClasses(st) {
      if (!st || !st.state) return ['bis-lampe-unk', 'unbekannt'];
      var o = st.state.on;
      if (o === true) return ['bis-lampe-an', 'ein'];
      if (o === false) return ['bis-lampe-aus', 'aus'];
      return ['bis-lampe-unk', 'unbekannt'];
    }
    /* Topic 45329 ↔ SVG u. a. data-cell-id="BL45329" */
    function lampIdSvgCandidates(lampId) {
      var s = String(lampId).trim();
      var out = [];
      function add(x) {
        if (x === '' || x === null || x === undefined) return;
        if (out.indexOf(x) < 0) out.push(x);
      }
      add(s);
      if (/^\d+$/.test(s)) add('BL' + s);
      if (/^bl\d+$/i.test(s)) add(s.replace(/^bl/i, ''));
      return out;
    }
    function escAttr(val) {
      return (window.CSS && typeof CSS.escape === 'function') ? CSS.escape(String(val)) : String(val).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    }
    function findLampGroup(svg, lampId) {
      var cands = lampIdSvgCandidates(lampId);
      var doc = svg && svg.ownerDocument;
      var i, c, e, g;
      for (i = 0; i < cands.length; i++) {
        c = cands[i];
        e = escAttr(c);
        g = svg.querySelector('g[data-bis-lamp-id="' + e + '"]')
          || svg.querySelector('g[data-cell-id="' + e + '"]')
          || svg.querySelector('g[id="' + e + '"]');
        if (g) return g;
        if (doc && doc.getElementById) {
          g = doc.getElementById(c);
          if (g && (g.tagName === 'g' || g.tagName === 'G')) return g;
        }
      }
      return null;
    }
    function applyLampState(lampId, payload) {
      if (!lampId) return;
      var svgDoc = obj.contentDocument;
      if (!svgDoc) return;
      var svg = svgDoc.querySelector('svg');
      if (!svg) return;
      var idStr = String(lampId);
      var g = findLampGroup(svg, idStr);
      if (!g) {
        if (dbg) console.warn('[beleuchtung] kein <g> für lamp_id', idStr, '(gesucht u. a. als BL' + idStr + ' — data-bis-lamp-id / data-cell-id / id)');
        return;
      }
      g.classList.remove('bis-lampe-an', 'bis-lampe-aus', 'bis-lampe-unk');
      var cl = stateToClasses(payload);
      g.classList.add(cl[0]);
      g.setAttribute('title', 'Lampe ' + lampId + ': ' + cl[1]);
    }
    function applyAllFromStates(states) {
      if (!states) return;
      Object.keys(states).forEach(function (k) { applyLampState(k, states[k]); });
    }
    function whenSvgReady(fn) {
      function run() {
        if (!obj || !obj.contentDocument || !obj.contentDocument.querySelector('svg')) return;
        try {
          injectBeleuchtungLampStyles(obj.contentDocument);
          fn();
        } catch (e) { if (dbg) console.warn(e); }
      }
      if (obj.contentDocument && obj.contentDocument.querySelector('svg')) {
        run();
        return;
      }
      obj.addEventListener('load', function onObjLoad() {
        obj.removeEventListener('load', onObjLoad);
        run();
      });
    }
    function reapplyAll() {
      whenSvgReady(function () { applyAllFromStates(lastStates); });
    }
    function extractNumericLampId(raw) {
      var m = String(raw || '').trim().match(/^(?:BL)?(\d+)$/i);
      return m ? m[1] : '';
    }
    function sendBlCommand(rawId) {
      var id = extractNumericLampId(rawId);
      if (!id) return;
      var current = lastStates[id];
      var isOn = !!(current && current.state && current.state.on === true);
      var targetOn = !isOn;
      var commandUrl = {{ url_for('technik.beleuchtung_command')|tojson }};
      setStatus('Befehl wird gesendet…', false);
      fetch(commandUrl, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id: id, target_on: targetOn})
      }).then(function (res) {
        return res.json().catch(function () { return {}; }).then(function (data) {
          if (!res.ok || !data.ok) throw new Error(data.message || ('HTTP ' + res.status));
          setStatus('Befehl gesendet: BL' + id + ' -> ' + (targetOn ? '1' : '0'), true);
        });
      }).catch(function (err) {
        setStatus('Befehl fehlgeschlagen: ' + (err && err.message ? err.message : 'Unbekannter Fehler'), false);
      });
    }
    function bindBlClicks(svgDoc) {
      var svg = svgDoc && svgDoc.querySelector && svgDoc.querySelector('svg');
      if (!svg) return;
      svg.querySelectorAll('g[data-bis-lamp-id], g[data-cell-id], g[id]').forEach(function (g) {
        var raw = g.getAttribute('data-bis-lamp-id') || g.getAttribute('data-cell-id') || g.getAttribute('id') || '';
        if (!/^BL\d+$/i.test(raw.trim())) return;
        if (g.getAttribute('data-bis-bl-click-bound') === '1') return;
        g.setAttribute('data-bis-bl-click-bound', '1');
        g.style.cursor = 'pointer';
        g.addEventListener('click', function (ev) {
          ev.preventDefault();
          ev.stopPropagation();
          sendBlCommand(raw);
        });
      });
    }
    whenSvgReady(function onSvgForBeleuchtung() {
      applyAllFromStates(lastStates);
      bindBlClicks(obj.contentDocument);
    });
    if (init && init.ok === false) {
      if (statusEl) setStatus('Echtzeit nicht verfügbar (Redis).', false);
      return;
    }
    if (!window.EventSource) {
      if (statusEl) setStatus('EventSource (SSE) im Browser nicht verfügbar.', false);
      return;
    }
    if (statusEl) {
      statusEl.textContent = 'Echtzeit: Verbindung wird hergestellt…';
      statusEl.className = 'small text-white-50 mb-0';
    }
    var ev = new EventSource(streamUrl);
    ev.addEventListener('init', function (e) {
      try {
        var d = JSON.parse(e.data);
        if (d.states) lastStates = d.states;
        reapplyAll();
        if (d.ok === true) {
          setStatus('Echtzeit verbunden (Redis + SSE).', true);
        } else {
          setStatus('Echtzeit: Redis nicht erreichbar (keine Live-Updates, SSE-Verbindung offen).', false);
        }
      } catch (err) { setStatus('Init-Daten ungültig.', false); }
    });
    ev.onmessage = function (e) {
      try {
        var d = JSON.parse(e.data);
        if (d.lamp_id) {
          lastStates[d.lamp_id] = d;
          whenSvgReady(function () {
            applyLampState(d.lamp_id, d);
            bindBlClicks(obj.contentDocument);
          });
        }
      } catch (err) { if (dbg) console.warn('SSE message', err); }
    };
    ev.onerror = function () {
      setStatus('Echtzeit unterbrochen, versuche Wiederverbindung…', false);
    };
  })();
  {% endif %}
})();
</script>
{% endblock %}
