# Reverse Proxy zum BIS-Gunicorn im Compose-Service "bis" (Flask liefert /static und Uploads)
# Liegt mit bis.Dockerfile und nginx.Dockerfile unter docker/ (ausserhalb deployment/,
# weil .dockerignore deployment/ fuer den Build-Kontext ausschliesst).
upstream bis_app {
    server bis:5000;
    keepalive 8;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/ssl/bis/bis.crt;
    ssl_certificate_key /etc/nginx/ssl/bis/bis.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20M;

    access_log /var/log/nginx/bis_access.log;
    error_log /var/log/nginx/bis_error.log;

    location / {
        proxy_pass http://bis_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
