# BIS – Betriebsinformationssystem
# Docker Compose für lokalen Betrieb (z. B. unter Windows 11 mit Docker Desktop)

services:
  bis:
    build: .
    container_name: bis-app
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      # SECRET_KEY MUSS von aussen gesetzt werden (docker-compose bricht sonst ab).
      # Erzeugen z. B. mit:  python -c "import secrets; print(secrets.token_urlsafe(48))"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY muss als Umgebungsvariable gesetzt sein}
      DATABASE_URL: /data/database_main.db
      UPLOAD_BASE_FOLDER: /data/Daten
      SESSION_COOKIE_SECURE: "true"
      REMEMBER_COOKIE_SECURE: "true"
      # Optional: WEBAUTHN_ORIGIN/RP_ID/RP_NAME anpassen, wenn ueber Hostname/IP zugegriffen wird
      # WEBAUTHN_ORIGIN: https://bis.example.com
      # WEBAUTHN_RP_ID: bis.example.com
      # WEBAUTHN_RP_NAME: BIS
    volumes:
      # Persistente Daten (Datenbank + Uploads)
      - bis-data:/data
    restart: unless-stopped

volumes:
  bis-data:
