# BIS – Betriebsinformationssystem
# Docker Compose für lokalen Betrieb (z. B. unter Windows 11 mit Docker Desktop)
#
# HTTPS: Nginx (443) mit selbstsigniertem Zertifikat, Proxy zum Service "Application-Service:5000".
# Zusaetzlich weiterhin direkter Zugriff auf die App: http://localhost:5000 (optional: ports bei "Application-Service" entfernen).
# Browser-Warnung beim ersten Aufruf von https://localhost ist bei Self-Signed normal.
# Zugriff: https://localhost/ (Standardport 443). http://localhost:443/ leitet Nginx per error_page 497 auf HTTPS um.

services:
  Application-Service:
    build:
      context: .
      dockerfile: docker/bis.Dockerfile
    image: bis/application-service:latest
    container_name: bis-application-service
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      TZ: Europe/Berlin
      # SECRET_KEY MUSS von aussen gesetzt werden (docker-compose bricht sonst ab).
      # Erzeugen z. B. mit:  python -c "import secrets; print(secrets.token_urlsafe(48))"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY muss als Umgebungsvariable gesetzt sein}
      DATABASE_URL: /data/database_main.db
      UPLOAD_BASE_FOLDER: /data/Daten
      SESSION_COOKIE_SECURE: "true"
      REMEMBER_COOKIE_SECURE: "true"
      # Typische Docker-Bridge-Netze: damit X-Forwarded-* vom Nginx-Container vertrauenswürdig sind
      TRUSTED_PROXIES: "172.16.0.0/12,127.0.0.1"
      # WebAuthn / Passkeys (FaceID, Windows Hello, TouchID):
      # WEBAUTHN_ORIGIN = exakte Basis-URL, die im Browser aufgerufen wird (https:// + Hostname, ohne Pfad).
      # WEBAUTHN_RP_ID  = Hostname ohne Schema und ohne Port (muss mit dem Origin uebereinstimmen).
      # Werden die Variablen nicht gesetzt, schlagen die WebAuthn-Endpunkte mit 503 fehl.
      # Uebliche Wege: Werte in einer .env neben docker-compose.yml setzen oder hier fest eintragen.
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-BIS – Betriebsinformationssystem}
      # Gunicorn: Worker/Threads konfigurierbar. Default (2 Worker, 4 Threads)
      # ist konservativ und passt zu SQLite+WAL. Bei Bedarf in .env erhoehen
      # (z. B. GUNICORN_WORKERS=4). Preload-Master laedt app.py einmal, Workers
      # erben den Zustand per fork() (siehe gunicorn_config.py).
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      # Rate-Limiter-Storage: gemeinsamer Store ueber Redis-Service, damit
      # Limits prozessuebergreifend zaehlen.
      RATELIMIT_STORAGE_URI: redis://Redis-Service:6379/0
    volumes:
      # Persistente Daten (Datenbank + Uploads)
      - C:\BIS-Daten:/data
    depends_on:
      Redis-Service:
        condition: service_started
    restart: unless-stopped

  Redis-Service:
    image: redis:7-alpine
    container_name: bis-redis-service
    # Rate-Limits brauchen keine Persistenz; AOF/RDB bewusst aus.
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    restart: unless-stopped

  Proxy-Service:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    image: bis/proxy-service:latest
    container_name: bis-proxy-service
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      Application-Service:
        condition: service_healthy
    restart: unless-stopped

  Backup-Service:
    build:
      context: .
      dockerfile: docker/backup.Dockerfile
    image: bis/backup-service:latest
    container_name: bis-backup-service
    environment:
      TZ: Europe/Berlin
      # 7z-Passwort (AES-256) fuer die verschluesselte Kopie nach OneDrive.
      # Pflicht, wenn der Backup-Service laeuft.
      BACKUP_ENCRYPTION_PASSWORD: ${BACKUP_ENCRYPTION_PASSWORD:?BACKUP_ENCRYPTION_PASSWORD muss als Umgebungsvariable gesetzt sein}
      # GFS-Retention (taeglich / woechentlich / monatlich)
      RETENTION_DAILY: "14"
      RETENTION_WEEKLY: "8"
      RETENTION_MONTHLY: "12"
      # "false" deaktiviert den taeglichen Erfolgs-Ping an Admins (Fehler kommen immer).
      NOTIFY_ON_SUCCESS: "true"
    volumes:
      # Gleicher Datenpfad wie Application-Service (DB + Uploads). rw noetig fuer Benachrichtigungs-Insert.
      - C:\BIS-Daten:/data
      # Lokales Backup-Ziel (unverschluesselt, schneller Restore).
      - C:\BIS-Backups:/backup-plain
      # Verschluesselte Offsite-Kopie (OneDrive synchronisiert in die Cloud).
      - C:\Users\MartinHilbert\OneDrive - Binca Handels GmbH\Apps\BIS\Backups:/backup-encrypted
    depends_on:
      - Application-Service
    restart: unless-stopped
