{% extends "layout/base.html" %}

{% block content %}
<div class="bis-toolbar justify-between mb-4">
  <h1 class="mb-0 bis-toolbar-title">
    <i class="bi bi-bell"></i> Alle Benachrichtigungen
  </h1>
  <div class="bis-toolbar-actions bis-actions-touch">
    <button id="alleGelesenBtn" class="btn btn-primary">
      <i class="bi bi-check-all"></i> Alle als gelesen markieren
    </button>
    <button id="alleGelesenenLoeschenBtn" class="btn btn-outline-danger">
      <i class="bi bi-trash"></i> Alle gelesenen löschen
    </button>
  </div>
</div>

  <div class="row">
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="card-body" id="benachrichtigungenContainer">
          <div class="text-center py-4">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Lädt...</span>
            </div>
            <p class="mt-2 text-muted">Benachrichtigungen werden geladen...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const container = document.getElementById('benachrichtigungenContainer');
  const alleGelesenBtn = document.getElementById('alleGelesenBtn');
  const alleGelesenenLoeschenBtn = document.getElementById('alleGelesenenLoeschenBtn');

  // Benachrichtigungen laden
  function loadBenachrichtigungen() {
    fetch('{{ url_for("dashboard.api_benachrichtigungen") }}')
      .then(response => response.json())
      .then(data => {
        if (!data.benachrichtigungen || data.benachrichtigungen.length === 0) {
          container.innerHTML = `
            <div class="text-center py-5">
              <i class="bi bi-inbox" style="font-size: 3rem; color: #6c757d;"></i>
              <p class="mt-3 text-muted">Keine Benachrichtigungen vorhanden</p>
            </div>
          `;
          alleGelesenBtn.style.display = 'none';
          alleGelesenenLoeschenBtn.style.display = 'none';
          return;
        }

        alleGelesenBtn.style.display = 'block';
        if (data.ungelesen_count === 0) {
          alleGelesenBtn.disabled = true;
          alleGelesenBtn.classList.add('btn-secondary');
          alleGelesenBtn.classList.remove('btn-primary');
        } else {
          alleGelesenBtn.disabled = false;
          alleGelesenBtn.classList.add('btn-primary');
          alleGelesenBtn.classList.remove('btn-secondary');
        }

        // Prüfe ob es gelesene Benachrichtigungen gibt
        const gelesen_count = data.benachrichtigungen.filter(n => n.Gelesen).length;
        if (gelesen_count > 0) {
          alleGelesenenLoeschenBtn.style.display = 'block';
          alleGelesenenLoeschenBtn.disabled = false;
        } else {
          alleGelesenenLoeschenBtn.style.display = 'none';
        }

        let html = '<div class="list-group list-group-flush">';
        data.benachrichtigungen.forEach(notif => {
          const datum = notif.ErstelltAm ? new Date(notif.ErstelltAm).toLocaleString('de-DE') : '';
          const gelesenClass = notif.Gelesen ? '' : 'list-group-item-warning';
          const gelesenBadge = notif.Gelesen ? '' : '<span class="badge bg-primary ms-2">Neu</span>';
          html += `
            <div class="list-group-item ${gelesenClass}">
              <div class="d-flex flex-wrap justify-content-between align-items-start gap-2">
                <div class="flex-grow-1" style="min-width: 0;">
                  <div class="d-flex align-items-center mb-2 gap-2 flex-wrap">
                    <h6 class="mb-0">${notif.Titel}</h6>
                    ${gelesenBadge}
                  </div>
                  <p class="mb-1 text-break">${notif.Nachricht}</p>
                  <div class="d-flex align-items-center gap-3 flex-wrap">
                    <small class="text-muted">
                      <i class="bi bi-clock"></i> ${datum}
                    </small>
                    ${notif.Modul ? `<small class="text-muted"><i class="bi bi-folder"></i> ${notif.Modul}</small>` : ''}
                  </div>
                </div>
                <div class="d-flex gap-2 flex-wrap justify-content-end bis-actions-touch">
                  ${notif.ziel_url ? `<a href="${notif.ziel_url}" class="btn btn-sm btn-outline-secondary">Öffnen</a>` : ''}
                  ${!notif.Gelesen ? `
                    <button class="btn btn-sm btn-outline-primary markiereGelesenBtn" data-id="${notif.ID}">
                      <i class="bi bi-check"></i> Als gelesen
                    </button>
                  ` : `
                    <span class="badge bg-success align-self-center">
                      <i class="bi bi-check-circle"></i> Gelesen
                    </span>
                  `}
                  <button class="btn btn-sm btn-outline-danger loescheBenachrichtigungBtn" data-id="${notif.ID}" title="Löschen">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </div>
            </div>
          `;
        });
        html += '</div>';

        container.innerHTML = html;

        // Event-Listener für "Als gelesen"-Buttons
        document.querySelectorAll('.markiereGelesenBtn').forEach(btn => {
          btn.addEventListener('click', function() {
            const benachrichtigungId = this.getAttribute('data-id');
            markiereAlsGelesen(benachrichtigungId);
          });
        });

        // Event-Listener für "Löschen"-Buttons
        document.querySelectorAll('.loescheBenachrichtigungBtn').forEach(btn => {
          btn.addEventListener('click', function() {
            const benachrichtigungId = this.getAttribute('data-id');
            loescheBenachrichtigung(benachrichtigungId);
          });
        });
      })
      .catch(error => {
        console.error('Fehler beim Laden der Benachrichtigungen:', error);
        container.innerHTML = `
          <div class="alert alert-danger mb-0">
            <i class="bi bi-exclamation-triangle"></i> Fehler beim Laden der Benachrichtigungen
          </div>
        `;
      });
  }

  // Einzelne Benachrichtigung als gelesen markieren
  function markiereAlsGelesen(benachrichtigungId) {
    fetch(`{{ url_for("dashboard.api_benachrichtigung_gelesen", benachrichtigung_id=0) }}`.replace('/0', '/' + benachrichtigungId), {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      }
    })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          loadBenachrichtigungen();
          // Badge in der Navigation aktualisieren
          if (typeof loadBenachrichtigungen === 'function' && window.loadBenachrichtigungen) {
            window.loadBenachrichtigungen();
          }
        } else {
          alert('Fehler: ' + (data.message || 'Unbekannter Fehler'));
        }
      })
      .catch(error => {
        console.error('Fehler:', error);
        alert('Fehler beim Markieren als gelesen');
      });
  }

  // Alle Benachrichtigungen als gelesen markieren
  alleGelesenBtn.addEventListener('click', function() {
    if (confirm('Möchten Sie wirklich alle Benachrichtigungen als gelesen markieren?')) {
      fetch('{{ url_for("dashboard.api_alle_benachrichtigungen_gelesen") }}', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        }
      })
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            loadBenachrichtigungen();
            // Badge in der Navigation aktualisieren
            if (typeof loadBenachrichtigungen === 'function' && window.loadBenachrichtigungen) {
              window.loadBenachrichtigungen();
            }
          } else {
            alert('Fehler: ' + (data.message || 'Unbekannter Fehler'));
          }
        })
        .catch(error => {
          console.error('Fehler:', error);
          alert('Fehler beim Markieren aller Benachrichtigungen als gelesen');
        });
    }
  });

  // Alle gelesenen Benachrichtigungen löschen
  alleGelesenenLoeschenBtn.addEventListener('click', function() {
    if (confirm('Möchten Sie wirklich alle gelesenen Benachrichtigungen löschen? Diese Aktion kann nicht rückgängig gemacht werden.')) {
      fetch('{{ url_for("dashboard.api_alle_gelesenen_benachrichtigungen_loeschen") }}', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        }
      })
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            alert(`${data.deleted_count || 0} Benachrichtigungen wurden gelöscht.`);
            loadBenachrichtigungen();
            // Badge in der Navigation aktualisieren
            if (typeof loadBenachrichtigungen === 'function' && window.loadBenachrichtigungen) {
              window.loadBenachrichtigungen();
            }
          } else {
            alert('Fehler: ' + (data.message || 'Unbekannter Fehler'));
          }
        })
        .catch(error => {
          console.error('Fehler:', error);
          alert('Fehler beim Löschen der gelesenen Benachrichtigungen');
        });
    }
  });

  // Funktion zum Löschen einer einzelnen Benachrichtigung
  function loescheBenachrichtigung(benachrichtigungId) {
    fetch(`{{ url_for("dashboard.api_benachrichtigung_loeschen", benachrichtigung_id=0) }}`.replace('/0', '/' + benachrichtigungId), {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      }
    })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          loadBenachrichtigungen();
          // Badge in der Navigation aktualisieren
          if (typeof loadBenachrichtigungen === 'function' && window.loadBenachrichtigungen) {
            window.loadBenachrichtigungen();
          }
        } else {
          alert('Fehler: ' + (data.message || 'Unbekannter Fehler'));
        }
      })
      .catch(error => {
        console.error('Fehler:', error);
        alert('Fehler beim Löschen der Benachrichtigung');
      });
  }

  // Initial laden
  loadBenachrichtigungen();
});
</script>
{% endblock %}
